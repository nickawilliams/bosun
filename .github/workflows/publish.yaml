name: Publish

on:
  release:
    types: [published]

  workflow_call:
    inputs:
      release_tag:
        description: "Existing release tag to publish"
        required: true
        type: string

  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish"
        required: true
        type: string

permissions:
  contents: read

jobs:
  macports:
    if: ${{ vars.PUBLISH_ENABLED == 'true' }}
    runs-on: macos-latest
    env:
      PORT_REPO: ${{ vars.PORT_REPO }}
      PORT_PULLREQUEST: ${{ vars.PORT_PULLREQUEST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve Tag
        id: release
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          if ! gh release view "${tag}" --json tagName >/dev/null 2>&1; then
            echo "::error::Release ${tag} not found. Please specify an existing release tag."
            exit 1
          fi
          echo "Validated release: ${tag}"
      - name: Install MacPorts
        run: |
          curl -LO "https://github.com/macports/macports-base/releases/download/v2.10.5/MacPorts-2.10.5-15-Sequoia.pkg"
          sudo installer -pkg MacPorts-2.10.5-15-Sequoia.pkg -target /
          echo "/opt/local/bin" >> "$GITHUB_PATH"
      - name: Dependencies
        run: |
          sudo port -N selfupdate
          sudo port -N install yq gettext
      - name: Import GPG
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          git_user_signingkey: true
          git_commit_gpgsign: true
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
      - name: Configure Git
        run: |
          git config --global commit.gpgsign true
          git config --global tag.gpgsign true
          git config --global user.signingkey "${{ steps.import_gpg.outputs.keyid }}"
          git config --global user.name "${{ vars.GIT_USER_NAME }}"
          git config --global user.email "${{ vars.GIT_USER_EMAIL }}"
      - name: Publish
        env:
          TAG: ${{ steps.release.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.MACPORTS_PORT_TOKEN }}
        run: make publish/macports

  homebrew:
    if: ${{ vars.PUBLISH_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    env:
      TAP_REPO: nickawilliams/homebrew-tap
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve Tag
        id: release
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          if ! gh release view "${tag}" --json tagName >/dev/null 2>&1; then
            echo "::error::Release ${tag} not found. Please specify an existing release tag."
            exit 1
          fi
          echo "Validated release: ${tag}"
      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext jq yq
      - name: Import GPG
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          git_user_signingkey: true
          git_commit_gpgsign: true
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
      - name: Configure Git
        run: |
          git config --global commit.gpgsign true
          git config --global tag.gpgsign true
          git config --global user.signingkey "${{ steps.import_gpg.outputs.keyid }}"
          git config --global user.name "${{ vars.GIT_USER_NAME }}"
          git config --global user.email "${{ vars.GIT_USER_EMAIL }}"
      - name: Publish
        env:
          TAG: ${{ steps.release.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: make publish/homebrew
