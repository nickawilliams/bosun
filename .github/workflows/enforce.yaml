name: Enforce

on:
  pull_request:
    types: [opened, edited]

permissions:
  pull-requests: write

jobs:
  pr-conventions:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce PR conventions
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          set -euo pipefail

          # Extract issue number from branch name (<issue>-<slug>)
          if [[ ! "${BRANCH}" =~ ^([0-9]+)- ]]; then
            echo "Branch '${BRANCH}' does not follow <issue>-<slug> convention; skipping"
            exit 0
          fi
          issue="${BASH_REMATCH[1]}"

          # --- Title prefix ---
          prefix="pr(#${issue}): "
          if [[ "${PR_TITLE}" == "${prefix}"* ]]; then
            echo "Title already has prefix: ${PR_TITLE}"
          else
            new_title="${prefix}${PR_TITLE}"
            echo "Setting title: ${new_title}"
            gh pr edit "${PR_NUMBER}" --repo "${{ github.repository }}" --title "${new_title}"
          fi

          # --- Closing reference (only on open) ---
          if [[ "${EVENT_ACTION}" != "opened" ]]; then
            exit 0
          fi

          if echo "${PR_BODY}" | grep -qiE "(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#${issue}\b"; then
            echo "Body already references #${issue} with a closing keyword"
            exit 0
          fi

          closing="Closes #${issue}"
          if [[ -z "${PR_BODY}" ]]; then
            new_body="${closing}"
          else
            new_body="$(printf '%s\n\n%s' "${PR_BODY}" "${closing}")"
          fi

          echo "Appending closing reference: ${closing}"
          gh pr edit "${PR_NUMBER}" --repo "${{ github.repository }}" --body "${new_body}"
