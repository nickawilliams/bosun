name: Reset

# Manually-triggered iteration reset. Resets a single release by version:
# deletes the release and tag, rewinds main to before the release commit,
# and (optionally) reverts the exact publish commits in the homebrew tap
# and macports fork. Never touches upstream macports PRs.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to reset (e.g. v1.2.3) or 'latest'"
        required: true
        type: string
      reset_tap:
        description: "Revert the homebrew tap commit for this version"
        required: false
        type: boolean
        default: true
      reset_ports_fork:
        description: "Revert the macports fork commit for this version"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  TAP_REPO: ${{ vars.TAP_REPO }}
  PORT_REPO: ${{ vars.PORT_REPO }}

jobs:
  reset-main:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version_no_v: ${{ steps.resolve.outputs.version_no_v }}
      previous_main: ${{ steps.snapshot.outputs.previous_main }}
      reset_to: ${{ steps.find_release.outputs.reset_to }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          input='${{ inputs.version }}'

          if [[ "${input}" == "latest" ]]; then
            tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')
            if [[ -z "${tag}" ]]; then
              echo "::error::No releases found — cannot resolve 'latest'"
              exit 1
            fi
            echo "Resolved 'latest' to ${tag}"
          else
            tag="${input}"
          fi

          # Validate the tag exists
          if ! git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag '${tag}' does not exist"
            exit 1
          fi

          version_no_v="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${version_no_v}" >> "$GITHUB_OUTPUT"
          echo "Resetting version: ${tag} (${version_no_v})"

      - name: Find release commit
        id: find_release
        run: |
          set -euo pipefail
          tag='${{ steps.resolve.outputs.tag }}'

          # The release workflow commits with: release(<bump>): <tag>
          release_sha=$(git log --format='%H' --grep="^release(.*): ${tag}$" --extended-regexp origin/main | head -1)

          if [[ -z "${release_sha}" ]]; then
            echo "::error::Could not find a release commit for ${tag} on main"
            echo "::error::Expected a commit matching 'release(...): ${tag}'"
            exit 1
          fi

          reset_to=$(git rev-parse "${release_sha}~1")
          echo "Release commit: ${release_sha}"
          echo "Will reset main to: ${reset_to}"
          echo "reset_to=${reset_to}" >> "$GITHUB_OUTPUT"

      - name: Snapshot current main
        id: snapshot
        run: |
          set -euo pipefail
          previous=$(git rev-parse origin/main)
          echo "previous_main=${previous}" >> "$GITHUB_OUTPUT"
          echo "main is currently at ${previous}"

      - name: Delete release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag='${{ steps.resolve.outputs.tag }}'
          if gh release view "${tag}" --json tagName >/dev/null 2>&1; then
            echo "Deleting release ${tag}"
            gh release delete "${tag}" --yes --cleanup-tag
          else
            echo "No release found for ${tag} (may already be deleted)"
          fi

      - name: Delete tag
        run: |
          set -euo pipefail
          tag='${{ steps.resolve.outputs.tag }}'
          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
            echo "Deleting remote tag ${tag}"
            git push origin ":refs/tags/${tag}"
          else
            echo "Remote tag ${tag} not found (may already be deleted)"
          fi

      - name: Import GPG
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          git_user_signingkey: true
          git_commit_gpgsign: true
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Configure Git
        run: |
          git config commit.gpgsign true
          git config tag.gpgsign true
          git config user.signingkey "${{ steps.import_gpg.outputs.keyid }}"
          git config user.name "${{ vars.GIT_USER_NAME }}"
          git config user.email "${{ vars.GIT_USER_EMAIL }}"

      - name: Reset main
        run: |
          set -euo pipefail
          reset_to='${{ steps.find_release.outputs.reset_to }}'
          previous='${{ steps.snapshot.outputs.previous_main }}'
          git checkout main
          git reset --hard "${reset_to}"
          git push --force-with-lease="main:${previous}" origin HEAD:main
          echo "main reset to ${reset_to}"

  reset-tap:
    if: ${{ inputs.reset_tap }}
    needs: reset-main
    runs-on: ubuntu-latest
    steps:
      - name: Import GPG
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          git_user_signingkey: true
          git_commit_gpgsign: true
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Revert homebrew tap commit
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GIT_USER_NAME: ${{ vars.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ vars.GIT_USER_EMAIL }}
          SIGNING_KEY: ${{ steps.import_gpg.outputs.keyid }}
          TAG: ${{ needs.reset-main.outputs.tag }}
        run: |
          set -euo pipefail
          tap_dir="$(mktemp -d)"
          trap 'rm -rf "${tap_dir}"' EXIT

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" "${tap_dir}"
          cd "${tap_dir}"

          git config commit.gpgsign true
          git config tag.gpgsign true
          git config user.signingkey "${SIGNING_KEY}"
          git config user.name "${GIT_USER_NAME}"
          git config user.email "${GIT_USER_EMAIL}"

          default_branch=$(git symbolic-ref --short HEAD)
          previous=$(git rev-parse HEAD)

          # Look for the exact publish commit for this version
          commit=$(git log --format='%H' --grep="^publish(formula): bosun ${TAG}$" --extended-regexp "${default_branch}" | head -1)

          if [[ -z "${commit}" ]]; then
            echo "No tap commit found for 'publish(formula): bosun ${TAG}' — publish may not have run"
            exit 0
          fi

          target=$(git rev-parse "${commit}~1")

          if [[ "${target}" == "${previous}" ]]; then
            echo "${TAP_REPO}/${default_branch} is already at the right state"
            exit 0
          fi

          echo "Reverting ${TAP_REPO}/${default_branch} from ${previous} to ${target}"
          echo "  (removing commit ${commit}: publish(formula): bosun ${TAG})"
          git reset --hard "${target}"
          git push --force-with-lease="${default_branch}:${previous}" origin "HEAD:${default_branch}"
          echo "${TAP_REPO}/${default_branch} reverted to ${target}"

  reset-ports-fork:
    if: ${{ inputs.reset_ports_fork }}
    needs: reset-main
    runs-on: ubuntu-latest
    steps:
      - name: Import GPG
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          git_user_signingkey: true
          git_commit_gpgsign: true
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Check for open upstream PRs
        env:
          GH_TOKEN: ${{ secrets.MACPORTS_PORT_TOKEN }}
        run: |
          set -euo pipefail
          upstream=$(gh repo view "${PORT_REPO}" --json parent --jq 'if .parent then "\(.parent.owner.login)/\(.parent.name)" else empty end')
          if [[ -z "${upstream}" ]]; then
            echo "::warning::${PORT_REPO} has no upstream parent; skipping upstream PR check"
            exit 0
          fi
          fork_owner="${PORT_REPO%%/*}"
          open=$(gh pr list --repo "${upstream}" --state open --json url,headRefName,headRepositoryOwner --jq \
            '[.[] | select(.headRepositoryOwner.login == "'"${fork_owner}"'")]')
          count=$(echo "${open}" | jq 'length')
          if [[ "${count}" != "0" ]]; then
            echo "::warning::${count} open PR(s) from ${PORT_REPO} to ${upstream} — never touching upstream PRs:"
            echo "${open}" | jq -r '.[] | "  \(.url) (head: \(.headRefName))"'
          fi

      - name: Revert macports fork commit
        env:
          GH_TOKEN: ${{ secrets.MACPORTS_PORT_TOKEN }}
          GIT_USER_NAME: ${{ vars.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ vars.GIT_USER_EMAIL }}
          SIGNING_KEY: ${{ steps.import_gpg.outputs.keyid }}
          VERSION_NO_V: ${{ needs.reset-main.outputs.version_no_v }}
        run: |
          set -euo pipefail
          port_dir="$(mktemp -d)"
          trap 'rm -rf "${port_dir}"' EXIT

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${PORT_REPO}.git" "${port_dir}"
          cd "${port_dir}"

          git config commit.gpgsign true
          git config tag.gpgsign true
          git config user.signingkey "${SIGNING_KEY}"
          git config user.name "${GIT_USER_NAME}"
          git config user.email "${GIT_USER_EMAIL}"

          default_branch=$(git symbolic-ref --short HEAD)
          previous=$(git rev-parse HEAD)

          # Look for the exact publish commit — either "update to" or "new port"
          commit=$(git log --format='%H' --grep="^bosun: update to ${VERSION_NO_V}$" --extended-regexp "${default_branch}" | head -1)
          if [[ -z "${commit}" ]]; then
            commit=$(git log --format='%H' --grep="^bosun: new port, version ${VERSION_NO_V}$" --extended-regexp "${default_branch}" | head -1)
          fi

          if [[ -z "${commit}" ]]; then
            echo "No macports commit found for version ${VERSION_NO_V} — publish may not have run"
            exit 0
          fi

          target=$(git rev-parse "${commit}~1")

          if [[ "${target}" == "${previous}" ]]; then
            echo "${PORT_REPO}/${default_branch} is already at the right state"
            exit 0
          fi

          commit_msg=$(git log --format='%s' -1 "${commit}")
          echo "Reverting ${PORT_REPO}/${default_branch} from ${previous} to ${target}"
          echo "  (removing commit ${commit}: ${commit_msg})"
          git reset --hard "${target}"
          git push --force-with-lease="${default_branch}:${previous}" origin "HEAD:${default_branch}"
          echo "${PORT_REPO}/${default_branch} reverted to ${target}"

  summary:
    needs: [reset-main, reset-tap, reset-ports-fork]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print summary
        run: |
          {
            echo "## Reset summary for ${{ needs.reset-main.outputs.tag }}"
            echo ""
            echo "- main: ${{ needs.reset-main.result }} (was ${{ needs.reset-main.outputs.previous_main }}, now ${{ needs.reset-main.outputs.reset_to }})"
            echo "- homebrew tap (${TAP_REPO}): ${{ needs.reset-tap.result }}"
            echo "- macports fork (${PORT_REPO}): ${{ needs.reset-ports-fork.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
