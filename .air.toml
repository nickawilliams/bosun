#:schema https://json.schemastore.org/any.json

root = "."
tmp_dir = ".out/air"

[build]
cmd = "make build"
entrypoint = ["/usr/bin/true"]
include_ext = ["go", "toml", "yaml", "txt"]
exclude_dir = ["terraform", ".out", ".cache", ".git"]

[log]
time = true
main_only = false

[misc]
clean_on_exit = true
